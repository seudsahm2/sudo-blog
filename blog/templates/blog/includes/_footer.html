<footer class="mt-16 py-8 border-t border-glass-border text-center text-white/40">
    <div class="container mx-auto px-4">
        {% if adsense_enabled and adsense_slot_footer %}
            <div class="max-w-5xl mx-auto mb-8 rounded-3xl border border-dashed border-white/10 bg-white/5 px-4 py-4">
                <div class="text-[11px] uppercase tracking-[0.35em] text-white/35 mb-3">Sponsored</div>
                <ins class="adsbygoogle block min-h-[120px]"
                    style="display:block"
                    data-ad-client="{{ adsense_client_id }}"
                    data-ad-slot="{{ adsense_slot_footer }}"
                    data-ad-format="auto"
                    data-full-width-responsive="true"></ins>
                <script>
                    (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>
        {% endif %}

        <div class="max-w-xl mx-auto mb-8 rounded-2xl border border-white/10 bg-white/5 px-5 py-5">
            <h4 class="text-sm uppercase tracking-[0.25em] text-white/60 mb-3">Newsletter Digest</h4>
            <form id="newsletter-form" class="flex flex-col sm:flex-row gap-3">
                <input
                    type="email"
                    name="email"
                    required
                    placeholder="you@example.com"
                    class="flex-1 rounded-xl border border-white/15 bg-slate-900/50 px-4 py-2.5 text-sm text-white placeholder-white/35 focus:outline-none focus:border-neon-cyan"
                >
                <button type="submit" class="rounded-xl bg-neon-cyan text-slate-900 font-bold px-5 py-2.5 hover:brightness-110 transition-all">Subscribe</button>
            </form>
            <p id="newsletter-feedback" class="mt-3 text-xs text-white/55"></p>
        </div>
        <p class="text-sm">&copy; {% now "Y" %} Stunning Blog. Designed with <span class="text-neon-pink">&hearts;</span>.</p>
        <div class="mt-4 flex flex-wrap justify-center gap-x-6 gap-y-2 text-sm font-medium">
            <a href="{{ about_url|default:'/about/' }}" class="hover:text-white transition-colors">About</a>
            <a href="{{ privacy_policy_url|default:'/privacy-policy/' }}" class="hover:text-white transition-colors">Privacy</a>
            <a href="{{ disclaimer_url|default:'/disclaimer/' }}" class="hover:text-white transition-colors">Disclaimer</a>
            <a href="{{ contact_url|default:'/contact/' }}" class="hover:text-white transition-colors">Contact</a>
        </div>
    </div>

    <script>
        (function() {
            const form = document.getElementById('newsletter-form');
            const feedback = document.getElementById('newsletter-feedback');
            if (!form || !feedback) return;

            form.addEventListener('submit', function(event) {
                event.preventDefault();
                const payload = new FormData(form);

                fetch("{% url 'blog:newsletter_subscribe' %}", {
                    method: 'POST',
                    body: payload,
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                })
                .then((response) => response.json().then((data) => ({ ok: response.ok, data: data })))
                .then(({ ok, data }) => {
                    if (!ok) {
                        feedback.textContent = 'Please enter a valid email address.';
                        feedback.className = 'mt-3 text-xs text-red-300';
                        return;
                    }
                    feedback.textContent = 'Subscribed. You will receive the next digest.';
                    feedback.className = 'mt-3 text-xs text-emerald-300';
                    form.reset();
                })
                .catch(() => {
                    feedback.textContent = 'Subscription failed. Try again in a moment.';
                    feedback.className = 'mt-3 text-xs text-red-300';
                });
            });
        })();
    </script>
</footer>
