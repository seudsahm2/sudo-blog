{% extends "blog/base.html" %}

{% block title %}{{ page_title }}{% endblock %}
{% block meta_description %}{{ page_title }} for policy, compliance, and transparency information.{% endblock %}

{% block content %}
<section class="max-w-4xl mx-auto px-4 pt-32 pb-20">
    <div class="rounded-3xl border border-white/10 bg-white/5 p-8 md:p-12 backdrop-blur-xl">
        <h1 class="text-3xl md:text-4xl font-black mb-6 text-white">{{ page_title }}</h1>
        <p class="text-white/70 leading-relaxed text-base md:text-lg">{{ page_body }}</p>
    </div>
</section>
{% endblock %}
